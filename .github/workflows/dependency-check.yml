name: OWASP Maven Dependency Check
on:
  schedule:
    - cron: '0 16 * * 0'
  push:
    branches:
      - 'release/**'
      - 'hotfix/**'
  workflow_dispatch:

jobs:
  check-dependencies:
    uses: skymatic/workflows/.github/workflows/run-dependency-check.yml@8356563bf7b8d1c8d693f75ca487e8f57573cec9 # v3.1.0
    with:
      runner-os: 'windows-2022'
      java-distribution: 'temurin'
      java-version: 25
    secrets:
      nvd-api-key: ${{ secrets.NVD_API_KEY }}
      ossindex-username: ${{ secrets.OSSINDEX_USERNAME }}
      ossindex-token: ${{ secrets.OSSINDEX_API_TOKEN }}
      slack-webhook-url: ${{ secrets.SLACK_WEBHOOK_CRYPTOMATOR_DESKTOP }}
